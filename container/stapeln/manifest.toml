# SPDX-License-Identifier: MPL-2.0
#
# Cerro Torre manifest for systemet .ctp bundle
#
# This manifest describes the container image for verified
# container packaging. Used by `ct pack` to create .ctp bundles.

[metadata]
name = "{{SERVICE_NAME}}"
version = "{{VERSION}}"
revision = 1
summary = "Equality Theory: one primitive relation (equality is conversion) at L1, discipline added in layers, not new relations."
description = """
systemet — containerised service packaged as a verified
cerro-torre .ctp bundle with Ed25519 signing and full provenance
tracking.
"""
license = "MPL-2.0"
homepage = "https://github.com/hyperpolymath/systemet"
maintainer = "Jonathan D.A. Jewell <{{EMAIL}}>"

[provenance]
upstream = "https://github.com/hyperpolymath/systemet"
import_date = 2026-06-28T00:00:00Z

[dependencies]
runtime = ["ca-certificates", "curl"]
build = []

[build]
system = "podman"

[build.environment]
APP_HOST = "[::]"
APP_PORT = "{{PORT}}"

[outputs]
primary = "{{SERVICE_NAME}}"
split = []

[attestations]
require = ["source-signature", "sbom-complete"]
recommend = ["security-audit", "reproducible-build"]

# Runtime security profile
[security]
user = "appuser"
group = "appuser"
read_only_root = false
no_new_privileges = true

[security.capabilities]
drop = ["ALL"]
add = ["NET_BIND_SERVICE"]

[security.network]
listen_tcp = [{{PORT}}]

[security.filesystem]
read = ["/app/", "/data/"]
write = ["/data/", "/tmp/"]
execute = ["/app/entrypoint.sh"]
